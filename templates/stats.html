<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stats - HematMahasiswa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .mobile-frame { 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
        }
        @supports (-webkit-touch-callout: none) {
            .mobile-frame { height: -webkit-fill-available; }
        }
    </style>
</head>
<body class="bg-slate-200 flex justify-center font-sans">

    <div class="bg-white w-full max-w-md mobile-frame shadow-2xl relative overflow-hidden">
        
        <div class="bg-[#00a844] p-8 rounded-b-[40px] text-white shrink-0 shadow-lg">
            <h1 class="text-xl font-bold italic text-center">Analisis Kantong</h1>
            <p class="text-sm opacity-90 mt-2 text-center text-green-100">Total Pengeluaran Keseluruhan</p>
            <h2 class="text-3xl font-black mt-1 text-center">Rp {{ "{:,.0f}".format(total) }}</h2>
        </div>

        <div class="flex-grow overflow-y-auto p-6 pb-4">
            
            <div class="bg-white rounded-[32px] p-6 shadow-sm border border-slate-100 mb-6">
                <h3 class="font-bold text-slate-800 mb-6 text-center text-sm uppercase tracking-widest">Alokasi Dana</h3>
                <div class="relative h-64">
                    <canvas id="expenseChart"></canvas>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-3">
                <div class="flex items-center justify-between p-4 bg-white rounded-2xl border border-slate-50 shadow-sm">
                    <div class="flex items-center gap-3">
                        <div class="w-4 h-4 rounded-full bg-[#00a844]"></div>
                        <span class="text-xs font-semibold text-slate-600">Makan & Minum</span>
                    </div>
                    <span class="font-bold text-slate-800 text-sm">Rp {{ "{:,.0f}".format(makan) }}</span>
                </div>
                
                <div class="flex items-center justify-between p-4 bg-white rounded-2xl border border-slate-50 shadow-sm">
                    <div class="flex items-center gap-3">
                        <div class="w-4 h-4 rounded-full bg-[#3b82f6]"></div>
                        <span class="text-xs font-semibold text-slate-600">Transportasi</span>
                    </div>
                    <span class="font-bold text-slate-800 text-sm">Rp {{ "{:,.0f}".format(transp) }}</span>
                </div>

                <div class="flex items-center justify-between p-4 bg-white rounded-2xl border border-slate-50 shadow-sm">
                    <div class="flex items-center gap-3">
                        <div class="w-4 h-4 rounded-full bg-[#fb923c]"></div>
                        <span class="text-xs font-semibold text-slate-600">Tidak Terduga</span>
                    </div>
                    <span class="font-bold text-slate-800 text-sm">Rp {{ "{:,.0f}".format(duga) }}</span>
                </div>
            </div>
        </div>

        <div class="bg-white border-t border-slate-100 flex justify-around p-4 text-slate-400 shrink-0 z-10">
            <a href="/" class="flex flex-col items-center hover:text-green-500 transition">
                <i class="fas fa-home text-lg"></i>
                <span class="text-[10px] mt-1 font-medium">Home</span>
            </a>
            <a href="/map" class="flex flex-col items-center hover:text-green-500 transition">
                <i class="fas fa-map-marker-alt text-lg"></i>
                <span class="text-[10px] mt-1 font-medium">Map</span>
            </a>
            <div class="flex flex-col items-center text-green-500">
                <i class="fas fa-chart-bar text-lg"></i>
                <span class="text-[10px] mt-1 font-medium">Stats</span>
            </div>
            <a href="/profil" class="flex flex-col items-center hover:text-green-500 transition">
                <i class="fas fa-user text-lg"></i>
                <span class="text-[10px] mt-1 font-medium">Profil</span>
            </a>
        </div>
    </div>

    <script>
        const dataMakan = Number("{{ makan|default(0) }}");
        const dataTransp = Number("{{ transp|default(0) }}");
        const dataDuga = Number("{{ duga|default(0) }}");

        const ctx = document.getElementById('expenseChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Makan', 'Transportasi', 'Tidak Terduga'],
                datasets: [{
                    data: [dataMakan, dataTransp, dataDuga],
                    backgroundColor: ['#00a844', '#3b82f6', '#fb923c'],
                    borderWidth: 0,
                    hoverOffset: 10,
                    borderRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                cutout: '75%'
            }
        });
    </script>
</body>
</html>
