<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Warung Murah - HematMahasiswa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 flex justify-center">
    <div class="bg-white w-full max-w-md h-screen shadow-2xl flex flex-col relative">
        
        <div class="bg-[#00a844] p-6 text-white shrink-0">
            <div class="flex items-center gap-3">
                <a href="/" class="text-xl"><i class="fas fa-arrow-left"></i></a>
                <h1 class="text-xl font-bold">Warung Sekitar Sorowajan</h1>
            </div>
        </div>

        <div class="flex-grow bg-slate-200 relative">
            <iframe 
                class="w-full h-full border-0"
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3952.883440784!2d110.4045!3d-7.794!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2e7a5f967665ce83%3A0xd9c76c6dee63a518!2sJl.%20Sorowajan!5e0!3m2!1sid!2sid!4v1715510000000!5m2!1sid!2sid" 
                allowfullscreen="" 
                loading="lazy">
            </iframe>
        </div>

        <div class="p-4 bg-white border-t border-slate-100 space-y-3 shrink-0 mb-20">
            <div class="flex items-center gap-4 p-3 bg-slate-50 rounded-xl">
                <span class="text-2xl">🍲</span>
                <div>
                    <h4 class="font-bold text-sm">Lesehan Pring Ori</h4>
                    <p class="text-[10px] text-slate-500 italic">Buka sampai 23.30</p>
                </div>
                <a href="https://www.google.com/maps/search/?api=1&query=Lesehan+Pring+Ori+Sorowajan" target="_blank" class="ml-auto text-green-600 font-bold text-xs underline">Rute</a>
            </div>
            <div class="flex items-center gap-4 p-3 bg-slate-50 rounded-xl">
                <span class="text-2xl">🍚</span>
                <div>
                    <h4 class="font-bold text-sm">Warung Makan Sadia</h4>
                    <p class="text-[10px] text-slate-500 italic">Dekat Jaranan</p>
                </div>
                <a href="https://www.google.com/maps/search/?api=1&query=Warung+Makan+Sadia+Sorowajan" target="_blank" class="ml-auto text-green-600 font-bold text-xs underline">Rute</a>
            </div>
        </div>

        <div class="bg-white border-t border-slate-100 flex justify-around p-4 text-slate-400 absolute bottom-0 w-full z-10">
            <a href="/" class="flex flex-col items-center hover:text-green-500 transition">
                <i class="fas fa-home text-lg"></i>
                <span class="text-[10px] mt-1 font-medium">Home</span>
            </a>
            <div class="flex flex-col items-center text-green-500">
                <i class="fas fa-map-marker-alt text-lg"></i>
                <span class="text-[10px] mt-1 font-medium">Map</span>
            </div>
            <div class="flex flex-col items-center">
                <i class="fas fa-chart-bar text-lg"></i>
                <span class="text-[10px] mt-1 font-medium">Stats</span>
            </div>
            <div class="flex flex-col items-center">
                <i class="fas fa-user text-lg"></i>
                <span class="text-[10px] mt-1 font-medium">Profil</span>
            </div>
        </div>
    </div>
</body>
</html>
