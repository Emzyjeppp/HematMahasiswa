<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Hemat - HematMahasiswa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .mobile-frame { 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
        }

        @supports (-webkit-touch-callout: none) {
            .mobile-frame { height: -webkit-fill-available; }
        }
    </style>
</head>
<body class="bg-slate-200 flex justify-center overflow-hidden font-sans">

    <div class="bg-white w-full max-w-md mobile-frame shadow-2xl relative overflow-hidden">
        
        <div class="bg-[#00a844] p-5 text-white shrink-0 z-20 shadow-md">
            <div class="flex items-center gap-3">
                <a href="/" class="text-xl hover:opacity-80"><i class="fas fa-arrow-left"></i></a>
                <h1 class="text-xl font-bold uppercase tracking-tight">Makan Hemat Sekitarmu</h1>
            </div>
        </div>

        <div class="flex-grow bg-slate-50 relative overflow-hidden">
            <iframe id="google-map" class="absolute inset-0 w-full h-full border-0" allowfullscreen="" loading="lazy"></iframe>
            
            <div id="map-loading" class="absolute inset-0 bg-white flex flex-col items-center justify-center z-30">
                <div class="animate-spin text-[#00a844] text-4xl mb-4"><i class="fas fa-circle-notch"></i></div>
                <p class="text-slate-500 font-medium italic text-sm">Mendeteksi titik lokasimu...</p>
            </div>

            <div id="slider-container" class="hidden absolute bottom-6 left-0 right-0 z-40">
                <div id="place-slider" class="flex overflow-x-auto gap-4 px-6 pb-6 no-scrollbar snap-x snap-mandatory">
                    </div>
            </div>
        </div>

        <div class="bg-white border-t border-slate-100 flex justify-around p-4 text-slate-400 shrink-0 z-50">
            <a href="/" class="flex flex-col items-center hover:text-green-500 transition">
                <i class="fas fa-home text-lg"></i>
                <span class="text-[10px] mt-1 font-medium">Home</span>
            </a>
            <div class="flex flex-col items-center text-green-500">
                <i class="fas fa-map-marker-alt text-lg"></i>
                <span class="text-[10px] mt-1 font-medium">Map</span>
            </div>
            <a href="/stats" class="flex flex-col items-center hover:text-green-500 transition">
                <i class="fas fa-chart-bar text-lg"></i>
                <span class="text-[10px] mt-1 font-medium">Stats</span>
            </a>
            <a href="/profil" class="flex flex-col items-center hover:text-green-500 transition">
                <i class="fas fa-user text-lg"></i>
                <span class="text-[10px] mt-1 font-medium">Profil</span>
            </a>
        </div>
    </div>

    <script>
        const places = [
            { name: "Burjo Sejahtera", query: "Burjo Sejahtera Sorowajan", icon: "🍜", desc: "Favorit Mahasiswa" },
            { name: "Warteg Bahari", query: "Warteg Bahari terdekat", icon: "🍱", desc: "Murah & Kenyang" },
            { name: "Dapur Munggur 31", query: "Dapur Munggur 31 Demangan", icon: "🍛", desc: "Buka 24 Jam" },
            { name: "Lesehan Pring Ori", query: "Lesehan Pring Ori Sorowajan", icon: "🍲", desc: "Bisa Lesehan" }
        ];

        let isLoaded = false;

        function startLocationTracking() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    if (isLoaded) return;
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    const iframe = document.getElementById('google-map');
                    
                    // URL Embed Google Maps yang paling stabil
                    iframe.src = `https://maps.google.com/maps?q=${lat},${lon}&hl=id&z=15&output=embed`;
                    
                    document.getElementById('map-loading').classList.add('hidden');
                    renderSlider(lat, lon);
                    isLoaded = true;
                }, (err) => {
                    alert("Pastikan GPS aktif & izin lokasi diberikan pada browser.");
                });
            } else {
                alert("Browser kamu tidak mendukung deteksi lokasi.");
            }
        }

        function renderSlider(lat, lon) {
            const slider = document.getElementById('place-slider');
            places.forEach(place => {
                
                // URL pencarian langsung ke aplikasi Google Maps
                const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(place.query)}`;
                
                const card = `
                    <div class="bg-white min-w-[280px] p-4 rounded-3xl shadow-2xl border border-slate-50 snap-center">
                        <div class="flex justify-between items-start mb-2">
                            <span class="bg-orange-50 text-orange-600 text-[9px] font-bold px-2 py-1 rounded-full uppercase">Terdekat</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-green-50 rounded-2xl flex items-center justify-center text-2xl">${place.icon}</div>
                            <div class="flex-grow">
                                <h4 class="font-bold text-slate-800 text-sm italic">${place.name}</h4>
                                <p class="text-slate-400 text-[10px]">${place.desc}</p>
                            </div>
                            <a href="${mapUrl}" target="_blank" class="w-11 h-11 bg-[#00a844] text-white rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition-transform">
                                <i class="fas fa-location-arrow"></i>
                            </a>
                        </div>
                    </div>
                `;
                slider.innerHTML += card;
            });
            document.getElementById('slider-container').classList.remove('hidden');
        }

        document.addEventListener('DOMContentLoaded', startLocationTracking);
    </script>
</body>
</html>
