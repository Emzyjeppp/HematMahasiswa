<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - HematMahasiswa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .mobile-frame { height: 100vh; display: flex; flex-direction: column; }
    </style>
</head>
<body class="bg-slate-200 flex justify-center font-sans">

    <div class="bg-white w-full max-w-md mobile-frame shadow-2xl relative overflow-hidden">
        
        <div class="bg-[#00a844] p-8 rounded-b-[40px] text-white shrink-0 shadow-lg relative">
            <h1 class="text-xl font-bold text-center mb-6">Profil Saya</h1>
            
            <div class="flex justify-center relative">
                <div class="relative w-28 h-28 rounded-full border-4 border-white shadow-xl bg-slate-100 overflow-hidden group">
                    <img id="profile-preview" src="{{ profile.photo if profile.photo else 'https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_1280.png' }}" alt="Foto Profil" class="w-full h-full object-cover">
                    
                    <div onclick="document.getElementById('photo-upload').click()" class="absolute inset-0 bg-black/40 flex flex-col justify-center items-center opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer">
                        <i class="fas fa-camera text-white text-xl"></i>
                        <span class="text-white text-[10px] mt-1 font-medium">Ubah</span>
                    </div>
                </div>
                <input type="file" id="photo-upload" class="hidden" accept="image/*" onchange="previewImage(event)">
            </div>
        </div>

        <div class="flex-grow overflow-y-auto p-6 pb-24 mt-4">
            
            <div class="space-y-5">
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Nama Panggilan</label>
                    <div class="mt-2 flex items-center bg-slate-50 p-4 rounded-2xl border border-slate-100 focus-within:border-green-400 focus-within:ring-2 focus-within:ring-green-100 transition-all">
                        <i class="fas fa-user text-slate-400 mr-3"></i>
                        <input type="text" id="input-name" value="{{ profile.name }}" class="bg-transparent w-full outline-none font-medium text-slate-700" placeholder="Masukkan nama kamu...">
                    </div>
                </div>

                <button onclick="saveProfileData()" id="btn-save" class="w-full bg-[#00a844] hover:bg-[#00913a] text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-transform flex justify-center items-center gap-2 mt-4">
                    <i class="fas fa-save"></i> Simpan Perubahan
                </button>
            </div>

            <div class="mt-8 space-y-2">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1 mb-3">Pengaturan</h3>
                <button class="w-full flex justify-between items-center p-4 bg-white rounded-2xl border border-slate-100 hover:bg-slate-50 transition text-left">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center text-blue-500"><i class="fas fa-bell"></i></div>
                        <span class="text-sm font-medium text-slate-700">Notifikasi Pengingat</span>
                    </div>
                    <i class="fas fa-chevron-right text-slate-300 text-xs"></i>
                </button>
                <button class="w-full flex justify-between items-center p-4 bg-white rounded-2xl border border-slate-100 hover:bg-slate-50 transition text-left">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-red-50 flex items-center justify-center text-red-500"><i class="fas fa-trash"></i></div>
                        <span class="text-sm font-medium text-slate-700">Hapus Semua Data</span>
                    </div>
                    <i class="fas fa-chevron-right text-slate-300 text-xs"></i>
                </button>
            </div>

        </div>

        <div class="bg-white border-t border-slate-100 flex justify-around p-4 text-slate-400 shrink-0 z-10 absolute bottom-0 w-full">
            <a href="/" class="flex flex-col items-center hover:text-green-500 transition">
                <i class="fas fa-home text-lg"></i>
                <span class="text-[10px] mt-1 font-medium">Home</span>
            </a>
            <a href="/map" class="flex flex-col items-center hover:text-green-500 transition">
                <i class="fas fa-map-marker-alt text-lg"></i>
                <span class="text-[10px] mt-1 font-medium">Map</span>
            </a>
            <a href="/stats" class="flex flex-col items-center hover:text-green-500 transition">
                <i class="fas fa-chart-bar text-lg"></i>
                <span class="text-[10px] mt-1 font-medium">Stats</span>
            </a>
            <div class="flex flex-col items-center text-green-500">
                <i class="fas fa-user text-lg"></i>
                <span class="text-[10px] mt-1 font-medium">Profil</span>
            </div>
        </div>
    </div>

    <script>
        let currentPhotoBase64 = "{{ profile.photo }}";

        // Fungsi untuk preview foto saat dipilih dari galeri
        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('profile-preview').src = e.target.result;
                    currentPhotoBase64 = e.target.result; // Simpan base64 ke memori sementara
                }
                reader.readAsDataURL(file);
            }
        }

        // Fungsi untuk mengirim data ke server Flask
        async function saveProfileData() {
            const newName = document.getElementById('input-name').value;
            const btn = document.getElementById('btn-save');

            if (!newName) {
                alert("Nama tidak boleh kosong!");
                return;
            }

            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Menyimpan...`;
            btn.disabled = true;

            const response = await fetch('/update_profile', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: newName, photo: currentPhotoBase64 })
            });

            if (response.ok) {
                btn.innerHTML = `<i class="fas fa-check"></i> Tersimpan!`;
                btn.classList.replace('bg-[#00a844]', 'bg-teal-500');
                
                // Kembalikan tombol seperti semula setelah 2 detik
                setTimeout(() => {
                    btn.innerHTML = `<i class="fas fa-save"></i> Simpan Perubahan`;
                    btn.classList.replace('bg-teal-500', 'bg-[#00a844]');
                    btn.disabled = false;
                }, 2000);
            } else {
                alert("Gagal menyimpan profil.");
                btn.innerHTML = `<i class="fas fa-save"></i> Simpan Perubahan`;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
